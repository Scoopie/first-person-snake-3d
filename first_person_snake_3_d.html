<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050912" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Snake 3D" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./pwa-icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./maskable-icon.svg" />
    <title>Snake 3D</title>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="panel">
        <div class="score">Score: <span id="score">0</span></div>
      </div>
      <div id="crosshair"></div>
      <div id="floatingFoodInfo">
        <div class="food-name" id="floatingFoodName"></div>
      </div>
    </div>

    <div id="message">
      <div class="landscape-hint" aria-label="Landscape mode suggested" title="Landscape mode suggested">
        <span class="phone-icon"></span>
      </div>
      <h1>Snake 3D</h1>
      <p></p>
      <div class="leaderboard-panel" id="leaderboardPanel">
        <div class="leaderboard-header">Top Scores</div>
        <ol id="leaderboardList" class="leaderboard-list">
          <li>Loading scores...</li>
        </ol>
        <div class="leaderboard-submit hidden" id="leaderboardSubmitRow">
          <input id="leaderboardName" maxlength="16" autocomplete="nickname" placeholder="Name" aria-label="Leaderboard name" />
          <button id="leaderboardSubmit" type="button">Submit</button>
        </div>
        <div class="leaderboard-status" id="leaderboardStatus"></div>
      </div>
      <button id="startBtn">Start game</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
