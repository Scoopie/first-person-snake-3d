<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake 3D</title>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="hud">
      <div class="panel">
        <div class="score">Score: <span id="score">0</span></div>
        <div class="score high-score">High: <span id="highScore">0</span></div>
      </div>
      <div id="crosshair"></div>
      <div id="floatingFoodInfo">
        <div class="food-name" id="floatingFoodName"></div>
      </div>
    </div>

    <div id="message">
      <div class="landscape-hint" aria-label="Landscape mode suggested" title="Landscape mode suggested">
        <span class="phone-icon"></span>
      </div>
      <h1>Snake 3D</h1>
      <p></p>
      <div class="food-legend" aria-label="Food legend">
        <div class="legend-item"><span class="legend-icon legend-plus" style="--swatch: #ff4d4d"></span><strong>Bonus</strong><span>+5</span></div>
        <div class="legend-item"><span class="legend-icon legend-hourglass" style="--swatch: #9fd3ff"></span><strong>Slow</strong><span>slower</span></div>
        <div class="legend-item"><span class="legend-icon legend-bolt" style="--swatch: #fff176"></span><strong>Fast</strong><span>speed</span></div>
        <div class="legend-item"><span class="legend-icon legend-double" style="--swatch: #ffa94d"></span><strong>Double</strong><span>x2 length</span></div>
        <div class="legend-item"><span class="legend-icon legend-ghost" style="--swatch: #d8b4fe"></span><strong>Ghost</strong><span>pass body</span></div>
      </div>
      <button id="startBtn">Start game</button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
